<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SODI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <div id="divLogosodi">
          <img src="../icons/sodiLogo.png" alt="" id="logo" />
        </div>
        <div id="divUser">
          <div id="user">
            <img src="" alt="" id="userImg" />
          </div>
        </div>
      </header>
      <!-- <nav>
        <p id="osN">OS</p>
        <p id="mN">MANUAIS</p>
      </nav> -->
      <article id="divFormbuttons">
         <div id="divTform">
            <h2 id="tFormulario">Formulário OS</h2>
          </div>
        <div id="formulario">
          <div id="divInputs">
            <input
              type="text"
              placeholder="Id da máquina..."
              class="inputs"
              id="idMaq"
            />
            <input
              type="text"
              placeholder="Status..."
              class="inputs"
              id="statusMaq"
            />
            <input
              type="text"
              placeholder="Ano da Máquina..."
              class="inputs"
              id="anoMaq"
            />

            <input
              type="text"
              class="inputs"
              placeholder="Descrição..."
              id="descMaq"
            />
            <input
              type="text"
              placeholder="Marca..."
              class="inputs"
              id="marcaMaq"
            />
            <input
              type="text"
              placeholder="Mecânico responsável..."
              class="inputs"
              id="mecanicoMaq"
            />
            <input
              type="text"
              class="inputs"
              placeholder="Modelo da máquina..."
              id="modeloMaq"
            />
            <input type="date" class="inputs" id="dataMaq" />
          </div>
          <div id="divButtons">
            <button id="buttonS">SALVAR</button>
            <button id="buttonC">CANCELAR</button>
          </div>
        </div>
        <button id="buttonNo">CRIAR NOVA ORDEM</button>
      </article>
      <article id="servicos"></article>
      <footer></footer>
    </main>
    <script src="script.js"></script>
  </body>
</html>
